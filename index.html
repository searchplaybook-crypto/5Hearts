<style>
:root{--bg:#f0e6e8;--bg-deep:#e8d9dc;--bg-light:#faf5f6;--ink:#2c1810;--rose:#a04050;--rose-light:#c97b84;--gold:#d4af37;--gold-light:#f4e5bc;--stone:#8a6a6e;--line:#dccfd2;--shadow-light:rgba(255,255,255,0.72);--shadow-dark:rgba(160,64,80,0.18);--glass:rgba(255,255,255,0.25);--glass-border:rgba(255,255,255,0.45);--neu-radius:24px;--neu-radius-lg:32px;--transition:all .35s cubic-bezier(.4,0,.2,1)}
*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}
body{font-family:'Lato',sans-serif;background:var(--bg);color:var(--ink);overflow-x:hidden;-webkit-font-smoothing:antialiased}
h1,h2,h3,h4,h5,h6,.brand-font{font-family:'Cinzel',serif}.serif-font{font-family:'Playfair Display',serif}

/* Loader */
#loader{position:fixed;inset:0;z-index:9999;background:linear-gradient(135deg,#fdf2f4,#f5e6ea);display:flex;flex-direction:column;justify-content:center;align-items:center;transition:opacity 1s ease,visibility 1s}
.loader-logo{width:280px;max-width:80vw;height:auto;animation:loaderBreathe 3s ease-in-out infinite;filter:drop-shadow(0 20px 60px rgba(160,64,80,.2))}
@keyframes loaderBreathe{0%,100%{transform:scale(1) translateY(0);opacity:.9}50%{transform:scale(1.03) translateY(-8px);opacity:1}}
.loader-text{margin-top:30px;font-family:'Cinzel',serif;font-size:1.5rem;letter-spacing:8px;color:var(--rose);font-weight:700;animation:shimmerText 2.5s ease-in-out infinite;background:linear-gradient(90deg,var(--rose),var(--gold),var(--rose));background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
@keyframes shimmerText{0%{background-position:0% center}100%{background-position:200% center}}

/* Video Hero (replaces static parallax image) */
.parallax-hero{position:fixed;top:0;left:0;width:100%;height:120%;z-index:-3;overflow:hidden;will-change:transform;background:#2c1810}
.parallax-hero video,.parallax-hero .cld-video-player{width:100%;height:100%;object-fit:cover}
.parallax-hero::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(240,230,232,.3) 0%,rgba(240,230,232,.7) 60%,var(--bg) 100%)}
#bg-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-2;pointer-events:none}

/* Nav */
nav{position:fixed;top:0;width:100%;z-index:1000;padding:16px 5%;display:flex;justify-content:space-between;align-items:center;background:rgba(240,230,232,.82);backdrop-filter:blur(20px) saturate(1.2);border-bottom:1px solid rgba(212,175,55,.12);transition:var(--transition)}
nav.scrolled{background:rgba(240,230,232,.95);box-shadow:0 4px 30px rgba(160,64,80,.08)}
.nav-brand{display:flex;align-items:center;gap:14px;text-decoration:none}
.nav-brand img{width:48px;height:48px;border-radius:50%;object-fit:cover;box-shadow:5px 5px 14px var(--shadow-dark),-5px -5px 14px var(--shadow-light);transition:var(--transition)}
.nav-brand:hover img{box-shadow:8px 8px 24px var(--shadow-dark),-8px -8px 24px var(--shadow-light);transform:scale(1.05)}
.nav-brand span{font-family:'Cinzel',serif;font-weight:700;font-size:1.15rem;color:var(--rose);letter-spacing:1px}
.nav-links{display:flex;gap:32px;list-style:none;align-items:center}
.nav-links a{text-decoration:none;color:var(--ink);font-weight:600;font-size:.8rem;text-transform:uppercase;letter-spacing:1.5px;position:relative;transition:var(--transition);padding:8px 0}
.nav-links a::after{content:'';position:absolute;bottom:0;left:0;width:0;height:2px;background:var(--gold);transition:width .3s ease}
.nav-links a:hover{color:var(--rose-light)}.nav-links a:hover::after{width:100%}
.inquiry-pill{display:flex;align-items:center;gap:10px;padding:10px 22px;border-radius:50px;background:var(--bg);box-shadow:5px 5px 12px var(--shadow-dark),-5px -5px 12px var(--shadow-light);font-size:.72rem;letter-spacing:1.5px;text-transform:uppercase;font-weight:700;color:var(--rose);cursor:pointer;transition:var(--transition);border:none;position:relative;overflow:hidden}
.inquiry-pill::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(212,175,55,.15),transparent);transform:translateX(-100%);transition:transform .5s}
.inquiry-pill:hover::before{transform:translateX(100%)}
.inquiry-pill:hover{box-shadow:inset 4px 4px 8px var(--shadow-dark),inset -4px -4px 8px var(--shadow-light);color:var(--gold)}
.inquiry-pill .dot{width:8px;height:8px;border-radius:50%;background:var(--gold);animation:pulseDot 2s ease-in-out infinite}
@keyframes pulseDot{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.4);opacity:.7}}

/* Floating Logo Button */

/* Floating Hearts */
.heart-float{position:fixed;pointer-events:none;z-index:997;font-size:20px;opacity:0;animation:heartFloatUp 1.2s ease-out forwards}
@keyframes heartFloatUp{0%{transform:translateY(0) scale(.5) rotate(0deg);opacity:1}50%{opacity:.8}100%{transform:translateY(-120px) scale(1.3) rotate(20deg);opacity:0}}

/* Hero */
.hero{min-height:100vh;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:140px 20px 80px;text-align:center;overflow:hidden}
.hero-logo{width:200px;height:auto;margin-bottom:30px;filter:drop-shadow(0 15px 30px rgba(160,64,80,.15));animation:heroLogoFloat 6s ease-in-out infinite}
@keyframes heroLogoFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.hero-title{font-family:'Cinzel',serif;font-size:clamp(2.8rem,6vw,5.5rem);font-weight:700;line-height:1.05;letter-spacing:4px;margin-bottom:8px;position:relative}
.hero-title .line1{display:block;background:linear-gradient(135deg,#8b1e3f 0%,#a04050 40%,#d4af37 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(2px 2px 0px rgba(139,30,63,.3)) drop-shadow(4px 4px 0px rgba(212,175,55,.15));animation:titleShimmer 4s ease-in-out infinite;background-size:200% auto}
.hero-title .line2{display:block;font-size:.45em;letter-spacing:6px;font-weight:600;color:var(--gold);margin-top:10px;text-shadow:1px 1px 2px rgba(212,175,55,.3)}
.hero-title .line3{display:block;font-family:'Playfair Display',serif;font-style:italic;font-size:.28em;letter-spacing:3px;color:var(--rose-light);margin-top:12px;font-weight:400}
@keyframes titleShimmer{0%,100%{background-position:0% center}50%{background-position:100% center}}
.hero-content{max-width:760px;padding:50px 40px;background:var(--glass);backdrop-filter:blur(24px) saturate(1.3);border:1px solid var(--glass-border);border-radius:var(--neu-radius-lg);box-shadow:0 20px 60px rgba(160,64,80,.1),inset 0 1px 0 rgba(255,255,255,.4);margin-top:40px}
.hero-subtitle{font-family:'Playfair Display',serif;font-style:italic;font-size:1.2rem;color:var(--gold);margin-bottom:12px;letter-spacing:1px}
.hero p{font-size:1rem;line-height:1.85;color:var(--stone);margin-bottom:32px}
.cta-btn{display:inline-flex;align-items:center;gap:12px;padding:16px 40px;background:var(--bg);color:var(--rose);text-decoration:none;font-weight:700;font-size:.85rem;letter-spacing:2px;text-transform:uppercase;border-radius:50px;border:none;cursor:pointer;box-shadow:8px 8px 20px var(--shadow-dark),-8px -8px 20px var(--shadow-light);transition:var(--transition);font-family:'Cinzel',serif;position:relative;overflow:hidden}
.cta-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(212,175,55,.2),transparent);transform:translateX(-100%);transition:transform .6s}
.cta-btn:hover::before{transform:translateX(100%)}
.cta-btn:hover{transform:translateY(-3px);box-shadow:12px 12px 30px var(--shadow-dark),-12px -12px 30px var(--shadow-light),0 0 20px rgba(212,175,55,.2);color:var(--gold)}
.cta-btn:active{box-shadow:inset 6px 6px 12px var(--shadow-dark),inset -6px -6px 12px var(--shadow-light);transform:translateY(0)}

/* Marquee */
.marquee{background:var(--rose);color:var(--bg-light);padding:14px 0;overflow:hidden;white-space:nowrap;font-size:11px;letter-spacing:3px;text-transform:uppercase;font-weight:600;position:relative;z-index:10}
.marquee-inner{display:inline-block;animation:marqueeScroll 30s linear infinite}
.marquee span{margin:0 40px}.marquee span::before{content:'♥';margin-right:40px;color:var(--gold)}
@keyframes marqueeScroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}

/* Section Headers */
.section-head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:60px;padding-bottom:24px;border-bottom:1px solid var(--line);flex-wrap:wrap;gap:20px}
.section-label{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--stone);font-weight:600}
.section-title{font-family:'Cinzel',serif;font-size:clamp(32px,4vw,56px);font-weight:400;line-height:1.05;color:var(--rose);margin-top:8px}
.section-title em{font-family:'Playfair Display',serif;font-style:italic;color:var(--gold)}

/* About */
.about{padding:100px 5%}.about-card{max-width:860px;margin:0 auto;padding:60px 50px;background:var(--bg);border-radius:var(--neu-radius-lg);box-shadow:16px 16px 40px var(--shadow-dark),-16px -16px 40px var(--shadow-light);position:relative;overflow:hidden}
.about-card::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle,rgba(212,175,55,.05) 0%,transparent 70%);pointer-events:none}
.about-card h2{font-size:2.4rem;color:var(--rose);margin-bottom:24px;text-align:center}
.about-card h2::after{content:'♥';display:block;font-size:1.4rem;color:var(--gold);margin-top:10px}
.about-card p{font-size:1.05rem;line-height:1.9;color:var(--stone);text-align:center}
.about-card .highlight{color:var(--rose);font-weight:700}

/* Proof of Concept Banner */
.poc-banner{background:linear-gradient(135deg,rgba(160,64,80,.08),rgba(212,175,55,.08));border:2px dashed var(--gold);border-radius:var(--neu-radius);padding:30px 40px;margin-bottom:50px;text-align:center;position:relative;overflow:hidden}
.poc-banner::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle,rgba(212,175,55,.06) 0%,transparent 60%);pointer-events:none}
.poc-banner h3{font-family:'Cinzel',serif;color:var(--rose);font-size:1.4rem;margin-bottom:10px;position:relative;z-index:1}
.poc-banner p{color:var(--stone);font-size:.95rem;line-height:1.7;position:relative;z-index:1}
.poc-banner .poc-icon{font-size:2rem;margin-bottom:12px;display:block}

/* Catalogue */
.catalogue{padding:100px 5%;max-width:1400px;margin:0 auto}
.filter-bar{display:flex;justify-content:center;gap:14px;margin-bottom:50px;flex-wrap:wrap}
.filter-btn{padding:12px 26px;background:var(--bg);color:var(--ink);border:none;border-radius:50px;font-family:'Lato',sans-serif;font-weight:700;font-size:.8rem;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:var(--transition);box-shadow:5px 5px 12px var(--shadow-dark),-5px -5px 12px var(--shadow-light)}
.filter-btn:hover{transform:translateY(-2px);box-shadow:7px 7px 18px var(--shadow-dark),-7px -7px 18px var(--shadow-light)}
.filter-btn.active{color:var(--rose);box-shadow:inset 4px 4px 8px var(--shadow-dark),inset -4px -4px 8px var(--shadow-light)}
.catalogue-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:36px}

/* Product Card */
.card{background:var(--bg);border-radius:var(--neu-radius);overflow:hidden;box-shadow:12px 12px 30px var(--shadow-dark),-12px -12px 30px var(--shadow-light);transition:var(--transition);cursor:pointer;position:relative}
.card:hover{transform:translateY(-10px);box-shadow:20px 20px 50px var(--shadow-dark),-20px -20px 50px var(--shadow-light)}
.card-img-wrap{width:100%;aspect-ratio:4/5;overflow:hidden;position:relative;background:var(--bg-deep)}
.card-img{width:100%;height:100%;object-fit:cover;transition:transform .8s ease,filter .5s ease;filter:contrast(1.12) saturate(1.08)}
.card:hover .card-img{transform:scale(1.06);filter:contrast(1.2) saturate(1.15)}
.card-tag{position:absolute;top:16px;left:16px;z-index:3;padding:8px 14px;background:var(--bg);border-radius:20px;font-size:9px;letter-spacing:2px;text-transform:uppercase;font-weight:700;color:var(--rose);box-shadow:3px 3px 8px var(--shadow-dark),-3px -3px 8px var(--shadow-light)}
.card-tag.low{background:var(--rose);color:#fff;box-shadow:0 4px 15px rgba(160,64,80,.3)}
.card-body{padding:26px}.card-body h3{font-size:1.2rem;color:var(--rose);margin-bottom:8px;line-height:1.2}
.card-body p{font-size:.88rem;color:var(--stone);line-height:1.65;margin-bottom:18px}
.card-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.card-stock{font-size:.72rem;color:var(--stone);letter-spacing:1px;text-transform:uppercase}
.wa-enquire{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:14px;background:var(--bg);color:var(--rose);border:none;border-radius:16px;font-weight:700;font-size:.82rem;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:var(--transition);box-shadow:6px 6px 14px var(--shadow-dark),-6px -6px 14px var(--shadow-light);font-family:'Cinzel',serif;position:relative;overflow:hidden}
.wa-enquire::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(37,211,102,.1),transparent);transform:translateX(-100%);transition:transform .5s}
.wa-enquire:hover::before{transform:translateX(100%)}
.wa-enquire:hover{transform:scale(1.03);box-shadow:8px 8px 20px var(--shadow-dark),-8px -8px 20px var(--shadow-light),0 0 20px rgba(37,211,102,.15);color:#128c7e}
.wa-enquire:active{box-shadow:inset 4px 4px 8px var(--shadow-dark),inset -4px -4px 8px var(--shadow-light)}
.wa-enquire svg{width:18px;height:18px;fill:currentColor}
.wa-enquire .enquire-pulse{position:absolute;top:-7px;right:10px;width:16px;height:16px;border-radius:50%;background:var(--rose);box-shadow:0 3px 8px rgba(160,64,80,.4);animation:badgePulse 2s ease-in-out infinite;border:2px solid var(--bg);pointer-events:none}
.heart-hint{position:absolute;top:-26px;left:50%;transform:translateX(-50%) translateY(6px) scale(.6);opacity:0;color:var(--rose);font-size:16px;pointer-events:none;transition:all .3s cubic-bezier(.34,1.56,.64,1);z-index:5}
.heart-hint.show{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}

/* Placeholder */
.placeholder-card{background:var(--bg);border-radius:var(--neu-radius);padding:40px 30px;text-align:center;box-shadow:inset 6px 6px 14px var(--shadow-dark),inset -6px -6px 14px var(--shadow-light);border:2px dashed var(--line);display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:320px;transition:var(--transition)}
.placeholder-card:hover{border-color:var(--gold);box-shadow:inset 8px 8px 20px var(--shadow-dark),inset -8px -8px 20px var(--shadow-light)}
.placeholder-card .ph-icon{font-size:3rem;margin-bottom:16px;animation:phBounce 2s ease-in-out infinite}
@keyframes phBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.placeholder-card h4{font-family:'Cinzel',serif;color:var(--rose);font-size:1.1rem;margin-bottom:8px}
.placeholder-card p{font-size:.85rem;color:var(--stone);line-height:1.6}

/* Vignettes */
.vignettes{padding:100px 5%;background:var(--bg-deep)}
.vignette-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:40px;max-width:1200px;margin:0 auto}
.vignette{background:var(--bg);border-radius:var(--neu-radius-lg);overflow:hidden;box-shadow:14px 14px 36px var(--shadow-dark),-14px -14px 36px var(--shadow-light);transition:var(--transition)}
.vignette:hover{transform:translateY(-8px);box-shadow:20px 20px 50px var(--shadow-dark),-20px -20px 50px var(--shadow-light)}
.vignette-img{width:100%;aspect-ratio:16/10;object-fit:cover;filter:grayscale(.1) contrast(1.05);transition:filter .5s}
.vignette:hover .vignette-img{filter:grayscale(0) contrast(1.1)}
.vignette-body{padding:30px}.vignette-body h3{font-family:'Cinzel',serif;color:var(--rose);font-size:1.3rem;margin-bottom:10px}
.vignette-body p{font-size:.9rem;color:var(--stone);line-height:1.7;margin-bottom:20px}
.vignette-cta{display:inline-block;padding:10px 24px;background:var(--bg);color:var(--gold);text-decoration:none;font-weight:700;font-size:.75rem;letter-spacing:1.5px;text-transform:uppercase;border-radius:50px;box-shadow:4px 4px 10px var(--shadow-dark),-4px -4px 10px var(--shadow-light);transition:var(--transition)}
.vignette-cta:hover{box-shadow:inset 3px 3px 6px var(--shadow-dark),inset -3px -3px 6px var(--shadow-light);color:var(--rose)}

/* FAQ */
.faq{padding:100px 5%;max-width:800px;margin:0 auto}
.faq-item{background:var(--bg);border-radius:var(--neu-radius);margin-bottom:20px;box-shadow:8px 8px 20px var(--shadow-dark),-8px -8px 20px var(--shadow-light);overflow:hidden;transition:var(--transition)}
.faq-item.active{box-shadow:12px 12px 30px var(--shadow-dark),-12px -12px 30px var(--shadow-light)}
.faq-question{width:100%;padding:24px 30px;display:flex;justify-content:space-between;align-items:center;background:none;border:none;cursor:pointer;text-align:left;font-family:'Cinzel',serif;font-size:1.05rem;color:var(--rose);font-weight:600;letter-spacing:.5px}
.faq-icon{width:32px;height:32px;flex-shrink:0;border-radius:50%;background:var(--bg);box-shadow:3px 3px 8px var(--shadow-dark),-3px -3px 8px var(--shadow-light);display:flex;align-items:center;justify-content:center;font-size:1.2rem;color:var(--gold);transition:transform .4s cubic-bezier(.68,-.55,.265,1.55)}
.faq-item.active .faq-icon{transform:rotate(180deg)}
.faq-answer{max-height:0;overflow:hidden;transition:max-height .6s cubic-bezier(.68,-.55,.265,1.55),padding .4s ease;padding:0 30px}
.faq-item.active .faq-answer{max-height:500px;padding:0 30px 24px}
.faq-answer p{font-size:.95rem;color:var(--stone);line-height:1.75}

/* Contact */
.contact{padding:100px 5%;text-align:center}
.contact-box{max-width:700px;margin:0 auto;padding:60px 50px;background:var(--bg);border-radius:var(--neu-radius-lg);box-shadow:18px 18px 50px var(--shadow-dark),-18px -18px 50px var(--shadow-light);position:relative;overflow:hidden}
.contact-box::before{content:'';position:absolute;top:-30%;right:-30%;width:60%;height:60%;background:radial-gradient(circle,rgba(212,175,55,.08) 0%,transparent 70%);pointer-events:none}
.contact-box h2{font-size:2.2rem;color:var(--rose);margin-bottom:16px}
.contact-box p{font-size:1.05rem;color:var(--stone);li
